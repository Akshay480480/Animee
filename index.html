
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay's Anime Nexus</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: radial-gradient(ellipse at top, #0b0d16, #040406);
            color: #f1f5f9;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .glow-effect:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body class="p-4 md:p-8 selection:bg-purple-500/30">
    <div class="max-w-5xl mx-auto">
        
        <!-- Premium Header Area -->
        <header class="mb-8 pb-6 border-b border-slate-800/70">
            <div class="flex items-center gap-2 mb-1.5">
                <span class="h-2 w-2 rounded-full bg-purple-500 animate-pulse"></span>
                <span class="text-[10px] font-mono tracking-widest text-purple-400 uppercase">Personal Database Matrix</span>
            </div>
            <h1 id="site-title" class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                Akshay's Anime Nexus
            </h1>
            
            <div class="flex gap-2.5 mt-5">
                <button id="share-btn" onclick="shareList()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white text-xs font-bold py-3 rounded-xl shadow-[0_4px_20px_rgba(99,102,241,0.25)] transition duration-300 cursor-pointer">
                    ✨ Broadcast Watchlist Link
                </button>
                <a id="back-to-mine" href="?" class="hidden w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs font-bold py-3 rounded-xl text-center items-center justify-center">
                    Return to My Workspace
                </a>
            </div>
        </header>

        <!-- Dynamic Live Statistics Engine -->
        <section class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
            <div class="glass-card p-3.5 rounded-xl">
                <p class="text-[10px] font-mono uppercase tracking-wider text-slate-500">Total Entries</p>
                <p id="stat-total" class="text-xl font-black mt-0.5 font-mono text-slate-100">0</p>
            </div>
            <div class="glass-card p-3.5 rounded-xl">
                <p class="text-[10px] font-mono uppercase tracking-wider text-amber-400/80">Active Operations</p>
                <p id="stat-watching" class="text-xl font-black mt-0.5 font-mono text-amber-400">0</p>
            </div>
            <div class="glass-card p-3.5 rounded-xl">
                <p class="text-[10px] font-mono uppercase tracking-wider text-emerald-400/80">Completed Logs</p>
                <p id="stat-completed" class="text-xl font-black mt-0.5 font-mono text-emerald-400">0</p>
            </div>
            <div class="glass-card p-3.5 rounded-xl">
                <p class="text-[10px] font-mono uppercase tracking-wider text-pink-400/80">Completion Rate</p>
                <p id="stat-ratio" class="text-xl font-black mt-0.5 font-mono text-pink-400">0%</p>
            </div>
        </section>

        <!-- Notification Toast -->
        <div id="toast" class="hidden fixed bottom-6 right-6 left-6 sm:left-auto bg-slate-900 border border-emerald-500/30 text-emerald-400 p-4 rounded-xl text-xs z-50 shadow-2xl transition-all duration-300 flex items-center gap-2">
            <span>🚀 Link copied to clipboard! Send it to your friends.</span>
        </div>

        <!-- Input Panel -->
        <section id="controls-section" class="glass-card p-4 rounded-xl mb-8 border-purple-500/10">
            <div class="flex flex-col gap-3">
                <input type="text" id="anime-title" placeholder="Enter series index title..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-purple-500 transition">
                <div class="grid grid-cols-12 gap-2">
                    <select id="anime-status" class="col-span-8 bg-slate-950 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-300 focus:outline-none focus:border-purple-500 transition">
                        <option value="watching">🍿 Currently Watching</option>
                        <option value="plan-to-watch">⏳ Plan to Watch</option>
                        <option value="completed">✅ Completed</option>
                    </select>
                    <input type="number" id="anime-rating" min="1" max="10" step="0.5" placeholder="★ /10" class="col-span-4 bg-slate-950 border border-slate-800 rounded-xl px-2 py-3 text-center text-sm text-white focus:outline-none focus:border-purple-500 transition">
                </div>
                <button onclick="addAnime()" class="w-full bg-slate-100 hover:bg-white text-slate-950 font-bold py-3 rounded-xl text-sm transition tracking-wide cursor-pointer">
                    Deploy to Database +
                </button>
            </div>
        </section>

        <!-- Layout Columns -->
        <main class="space-y-8">
            <!-- Watching -->
            <div>
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="font-bold text-xs tracking-wider uppercase text-amber-400 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-amber-400 rounded-full"></span> Active Rotations
                    </h3>
                    <span id="badge-watching" class="font-mono text-xs text-amber-400 bg-amber-400/5 px-2 py-0.5 rounded-md border border-amber-400/10">0</span>
                </div>
                <div id="list-watching" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
            </div>

            <!-- Plan To Watch -->
            <div>
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="font-bold text-xs tracking-wider uppercase text-indigo-400 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span> Target Queue
                    </h3>
                    <span id="badge-plan-to-watch" class="font-mono text-xs text-indigo-400 bg-indigo-400/5 px-2 py-0.5 rounded-md border border-indigo-400/10">0</span>
                </div>
                <div id="list-plan-to-watch" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
            </div>

            <!-- Completed -->
            <div>
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="font-bold text-xs tracking-wider uppercase text-emerald-400 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full"></span> System Archives
                    </h3>
                    <span id="badge-completed" class="font-mono text-xs text-emerald-400 bg-emerald-400/5 px-2 py-0.5 rounded-md border border-emerald-400/10">0</span>
                </div>
                <div id="list-completed" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
            </div>
        </main>
    </div>

    <script>
        let animeList = []; let isViewOnlyMode = false;
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search); const sharedData = urlParams.get('vault');
            if (sharedData) { try { animeList = JSON.parse(atob(sharedData)); isViewOnlyMode = true; setupViewOnlyUI(); } catch (e) { loadFromLocalStorage(); } } else { loadFromLocalStorage(); }
            renderList();
        }
        
        function loadFromLocalStorage() { const localData = localStorage.getItem('nexusAnimeVault'); animeList = localData ? JSON.parse(localData) : []; }
        
        function setupViewOnlyUI() { 
            const ctrl = document.getElementById('controls-section'); if (ctrl) ctrl.remove();
            document.getElementById('share-btn').remove();
            document.getElementById('site-title').innerText = "Shared Anime Workspace";
            document.getElementById('back-to-mine').style.display = 'flex';
        }
        
        function saveToStorage() { if (!isViewOnlyMode) localStorage.setItem('nexusAnimeVault', JSON.stringify(animeList)); }
        
        function addAnime() {
            const t = document.getElementById('anime-title'); const s = document.getElementById('anime-status'); const r = document.getElementById('anime-rating');
            if (!t.value.trim()) return;
            animeList.push({ id: Date.now(), title: t.value.trim(), status: s.value, currentEp: 0, rating: r.value ? parseFloat(r.value) : null });
            t.value = ''; r.value = ''; saveToStorage(); renderList();
        }
        
        function incrementEp(id, amt) { animeList = animeList.map(item => item.id === id ? { ...item, currentEp: Math.max(0, (item.currentEp || 0) + amt) } : item); saveToStorage(); renderList(); }
        
        function updateStatus(id, newStatus) { animeList = animeList.map(item => item.id === id ? { ...item, status: newStatus } : item); saveToStorage(); renderList(); }
        
        function deleteAnime(id) { animeList = animeList.filter(item => item.id !== id); saveToStorage(); renderList(); }
        
        function shareList() { const base64 = btoa(JSON.stringify(animeList)); const shareUrl = `${window.location.origin}${window.location.pathname}?vault=${base64}`; navigator.clipboard.writeText(shareUrl).then(() => { const toast = document.getElementById('toast'); toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }); }
        
        function renderList() {
            const containers = { 'watching': document.getElementById('list-watching'), 'plan-to-watch': document.getElementById('list-plan-to-watch'), 'completed': document.getElementById('list-completed') };
            const counts = { 'watching': 0, 'plan-to-watch': 0, 'completed': 0 };
            Object.values(containers).forEach(c => c.innerHTML = '');
            
            animeList.forEach(anime => {
                counts[anime.status]++;
                const card = document.createElement('div'); card.className = "glass-card glow-effect p-4 rounded-xl flex flex-col justify-between gap-3 transition duration-300";
                
                let scorePill = anime.rating ? `<span class="text-[10px] font-mono tracking-wider font-bold bg-purple-500/10 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded-md flex items-center gap-0.5">★ ${anime.rating.toFixed(1)}</span>` : '';
                
                let progressLayout = '';
                if (anime.status === 'watching') {
                    progressLayout = `<div class="flex justify-between items-center bg-slate-950/50 p-2.5 rounded-lg text-xs font-mono border border-slate-900">
                        <span class="text-slate-500">Progress Tracker</span>
                        <div class="flex items-center gap-2.5">
                            ${!isViewOnlyMode?`<button onclick="incrementEp(${anime.id},-1)" class="w-5 h-5 bg-slate-800 hover:bg-slate-700 active:scale-90 rounded text-amber-400 font-black flex items-center justify-center cursor-pointer">-</button>`:''}
                            <span class="font-bold text-slate-200">Ep ${anime.currentEp}</span>
                            ${!isViewOnlyMode?`<button onclick="incrementEp(${anime.id},1)" class="w-5 h-5 bg-slate-800 hover:bg-slate-700 active:scale-90 rounded text-amber-400 font-black flex items-center justify-center cursor-pointer">+</button>`:''}
                        </div>
                    </div>`;
                } else if (anime.status === 'completed') {
                    progressLayout = `<div class="text-xs text-emerald-400/90 font-mono flex items-center gap-1 py-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Fully Synchronized</div>`;
                }
                
                let controls = !isViewOnlyMode ? `<div class="flex justify-between items-center pt-2.5 border-t border-slate-800/50 mt-1">
                    <select onchange="updateStatus(${anime.id}, this.value)" class="text-xs font-medium bg-slate-950 border border-slate-900 rounded-lg px-2 py-1 text-slate-400 focus:outline-none focus:border-purple-500">
                        <option value="watching" ${anime.status==='watching'?'selected':''}>Watching</option>
                        <option value="plan-to-watch" ${anime.status==='plan-to-watch'?'selected':''}>To Watch</option>
                        <option value="completed" ${anime.status==='completed'?'selected':''}>Completed</option>
                    </select>
                    <button onclick="deleteAnime(${anime.id})" class="text-[11px] font-mono tracking-wide text-slate-600 hover:text-rose-400 uppercase transition">Purge</button>
                </div>` : '';
                
                card.innerHTML = `<div class="flex items-start justify-between gap-2"><div class="font-bold text-sm text-slate-200 break-words">${anime.title}</div>${scorePill}</div>${progressLayout}${controls}`;
                containers[anime.status].appendChild(card);
            });
            
            const total = animeList.length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-watching').innerText = counts['watching'];
            document.getElementById('stat-completed').innerText = counts['completed'];
            document.getElementById('stat-ratio').innerText = total > 0 ? `${Math.round((counts['completed'] / total) * 100)}%` : '0%';
            
            Object.keys(containers).forEach(k => { 
                document.getElementById(`badge-${k}`).innerText = counts[k];
                if(containers[k].children.length === 0) {
                    containers[k].innerHTML = `<div class="col-span-full text-xs text-slate-600 italic p-6 text-center border border-dashed border-slate-800/50 rounded-xl bg-slate-950/20">System logs currently empty</div>`;
                }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
