<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ishigami Science Codex</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22The%20Ishigami%20Science%20Codex%22%2C%22short_name%22%3A%22Science%20Codex%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23030605%22%2C%22theme_color%22%3A%22%2334d399%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fimg.icons8.com%2Fneon%2F512%2Ftest-tube.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image/png%22%7D%5D%7D">

    <link rel="icon" type="image/png" sizes="512x512" href="https://img.icons8.com/neon/512/test-tube.png">
    <link rel="apple-touch-icon" sizes="512x512" href="https://img.icons8.com/neon/512/test-tube.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: radial-gradient(ellipse at top, #080f0c, #030605); color: #f1f5f9; min-height: 100vh; font-family: system-ui, sans-serif; }
        .science-card { background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(52, 211, 153, 0.15); }
        .tier-row { border-left: 5px solid currentColor; }
    </style>
</head>
<body class="p-4 pb-12">
    <div class="max-w-5xl mx-auto">
        
        <header class="mb-6 pb-4 border-b border-emerald-900/40">
            <div class="flex items-center gap-1.5 mb-1">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] font-mono tracking-widest text-emerald-400 uppercase">Global Search Matrix</span>
            </div>
            <h1 id="site-title" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-amber-300">
                The Ishigami Science Codex 🧪
            </h1>
            <div class="flex gap-2 mt-4">
                <button id="share-btn" onclick="shareList()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-3 rounded-xl shadow-lg transition">✨ Share Codex with Friends</button>
                <a id="back-to-mine" href="?" class="hidden w-full bg-slate-800 text-slate-200 text-xs font-bold py-3 rounded-xl text-center items-center justify-center">Back to My Codex</a>
            </div>
        </header>

        <section class="grid grid-cols-2 gap-2 mb-6">
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-400">Total Entries</p><p id="stat-total" class="text-lg font-bold mt-0.5 text-slate-100">0</p></div>
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-amber-400">Active Logs</p><p id="stat-watching" class="text-lg font-bold mt-0.5 text-amber-400">0</p></div>
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-emerald-400">Fully Mastered</p><p id="stat-completed" class="text-lg font-bold mt-0.5 text-emerald-400">0</p></div>
            <div class="science-card p-3 rounded-xl text-center border-amber-500/30"><p class="text-[10px] uppercase text-amber-400">⏳ Screen Petrification</p><p id="stat-time" class="text-xs font-mono font-bold mt-1 text-amber-300">0h 0m</p></div>
        </section>

        <div id="toast" class="hidden fixed top-6 right-6 left-6 bg-slate-900 border border-emerald-500/40 text-emerald-400 p-4 rounded-xl text-xs z-50 text-center shadow-2xl transition-all"></div>

        <section id="controls-section" class="science-card p-4 rounded-xl mb-6">
            <div class="flex flex-col gap-3">
                <div class="grid grid-cols-2 gap-1 bg-slate-950 p-1 rounded-xl border border-slate-900">
                    <button id="type-anime" onclick="setMediaType('anime')" class="text-xs font-bold py-2 rounded-lg bg-emerald-400 text-slate-950 transition">🧪 Anime Mode</button>
                    <button id="type-manga" onclick="setMediaType('manga')" class="text-xs font-bold py-2 rounded-lg text-slate-400 transition">📚 Manga Mode</button>
                </div>

                <div class="relative">
                    <input type="text" id="anime-title" oninput="searchMedia()" autocomplete="off" placeholder="Start typing anime name... (e.g. Naruto, Bleach)" class="w-full bg-slate-950 border border-emerald-900/30 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-emerald-500">
                    <div id="search-results" class="hidden absolute left-0 right-0 top-full mt-1 bg-slate-950 border border-emerald-500/40 rounded-xl max-h-60 overflow-y-auto z-50 shadow-2xl divide-y divide-slate-900/60"></div>
                </div>
                
                <div class="grid grid-cols-12 gap-2">
                    <select id="anime-status" class="col-span-6 bg-slate-950 border border-emerald-900/30 rounded-xl px-2 py-2.5 text-xs text-slate-300 focus:outline-none">
                        <option value="watching" id="opt-watching">🍿 Watching Now</option>
                        <option value="plan-to-watch" id="opt-plan">⏳ Want to Watch</option>
                        <option value="completed" id="opt-done">✅ Finished</option>
                    </select>
                    <input type="number" id="anime-rating" min="1" max="10" step="0.5" placeholder="★ /10" class="col-span-3 bg-slate-950 border border-emerald-900/30 rounded-xl px-1 py-2.5 text-center text-xs text-white focus:outline-none">
                    <select id="anime-tier" class="col-span-3 bg-slate-950 border border-emerald-900/30 rounded-xl px-1 py-2.5 text-xs text-purple-400 font-bold focus:outline-none">
                        <option value="S">S-Tier</option>
                        <option value="A">A-Tier</option>
                        <option value="B">B-Tier</option>
                        <option value="C">C-Tier</option>
                        <option value="Trash">Trash</option>
                    </select>
                </div>

                <input type="text" id="anime-notes" placeholder="Favorite Character or Notes... (Optional)" class="w-full bg-slate-950 border border-emerald-900/30 rounded-xl px-4 py-2 text-xs text-slate-300 focus:outline-none">

                <button onclick="addAnime()" class="w-full bg-emerald-400 hover:bg-emerald-300 text-slate-950 font-black py-2.5 rounded-xl text-sm transition cursor-pointer">Deploy to Codex +</button>
            </div>
        </section>

        <main class="space-y-6">
            <div>
                <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-xs uppercase text-amber-400" id="head-watching">🍿 Active Rotations</h3><span id="badge-watching" class="text-xs text-amber-400 font-bold bg-amber-400/5 px-2 py-0.5 rounded">0</span></div>
                <div id="list-watching" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-xs uppercase text-teal-400" id="head-plan">⏳ Queue Targets</h3>
                    <div class="flex items-center gap-2">
                        <button onclick="runScienceRoulette()" class="text-[10px] bg-gradient-to-r from-amber-500 to-yellow-400 text-slate-950 font-black px-2 py-1 rounded-md active:scale-95 transition cursor-pointer">Science Roulette 🎲</button>
                        <span id="badge-plan-to-watch" class="text-xs text-teal-400 font-bold bg-teal-400/5 px-2 py-0.5 rounded">0</span>
                    </div>
                </div>
                <div id="list-plan-to-watch" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-xs uppercase text-emerald-400" id="head-completed">✅ Archived Logs</h3><span id="badge-completed" class="text-xs text-emerald-400 font-bold bg-emerald-400/5 px-2 py-0.5 rounded">0</span></div>
                <div id="list-completed" class="space-y-2"></div>
            </div>
        </main>

        <section class="mt-10 pt-6 border-t border-emerald-900/40">
            <h3 class="font-bold text-xs uppercase tracking-wider text-purple-400 mb-4 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-purple-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                Master Tier List Matrix
            </h3>
            <div class="space-y-2 rounded-xl overflow-hidden bg-slate-950/40 border border-slate-900 p-2">
                <div class="flex items-center gap-2 p-1 bg-slate-950/60 rounded-lg tier-row text-rose-500"><div class="w-12 text-center font-black text-sm text-rose-500">S</div><div id="tier-S" class="flex flex-wrap gap-1.5 p-1 min-h-[36px]"></div></div>
                <div class="flex items-center gap-2 p-1 bg-slate-950/60 rounded-lg tier-row text-orange-400"><div class="w-12 text-center font-black text-sm text-orange-400">A</div><div id="tier-A" class="flex flex-wrap gap-1.5 p-1 min-h-[36px]"></div></div>
                <div class="flex items-center gap-2 p-1 bg-slate-950/60 rounded-lg tier-row text-yellow-400"><div class="w-12 text-center font-black text-sm text-yellow-400">B</div><div id="tier-B" class="flex flex-wrap gap-1.5 p-1 min-h-[36px]"></div></div>
                <div class="flex items-center gap-2 p-1 bg-slate-950/60 rounded-lg tier-row text-green-400"><div class="w-12 text-center font-black text-sm text-green-400">C</div><div id="tier-C" class="flex flex-wrap gap-1.5 p-1 min-h-[36px]"></div></div>
                <div class="flex items-center gap-2 p-1 bg-slate-950/60 rounded-lg tier-row text-slate-500"><div class="w-12 text-center font-black text-xs text-slate-500">Trash</div><div id="tier-Trash" class="flex flex-wrap gap-1.5 p-1 min-h-[36px]"></div></div>
            </div>
        </section>
    </div>

    <script>
        let animeList = []; let isViewOnlyMode = false; let currentFormType = 'anime'; let tempImgUrl = ''; let searchTimeout;
        
        function init() { const urlParams = new URLSearchParams(window.location.search); const sharedData = urlParams.get('vault'); if (sharedData) { try { animeList = JSON.parse(atob(sharedData)); isViewOnlyMode = true; setupViewOnlyUI(); } catch (e) { loadFromLocalStorage(); } } else { loadFromLocalStorage(); } renderList(); document.addEventListener('click', (e) => { if (e.target.id !== 'anime-title') document.getElementById('search-results').classList.add('hidden'); }); }
        function loadFromLocalStorage() { const localData = localStorage.getItem('ishigamiScienceCodexV3'); animeList = localData ? JSON.parse(localData) : []; }
        function setupViewOnlyUI() { const ctrl = document.getElementById('controls-section'); if (ctrl) ctrl.remove(); document.getElementById('share-btn').remove(); document.getElementById('site-title').innerText = "Shared Science Codex"; document.getElementById('back-to-mine').style.display = 'flex'; }
        function saveToStorage() { if (!isViewOnlyMode) localStorage.setItem('ishigamiScienceCodexV3', JSON.stringify(animeList)); }
        
        function setMediaType(type) {
            currentFormType = type; tempImgUrl = ''; document.getElementById('anime-title').value = '';
            const btnAnime = document.getElementById('type-anime'); const btnManga = document.getElementById('type-manga');
            if (type === 'anime') {
                btnAnime.className = "text-xs font-bold py-2 rounded-lg bg-emerald-400 text-slate-950 transition"; btnManga.className = "text-xs font-bold py-2 rounded-lg text-slate-400 transition";
                document.getElementById('opt-watching').innerText = "🍿 Watching Now"; document.getElementById('opt-plan').innerText = "⏳ Want to Watch"; document.getElementById('opt-done').innerText = "✅ Finished Watching";
            } else {
                btnAnime.className = "text-xs font-bold py-2 rounded-lg text-slate-400 transition"; btnManga.className = "text-xs font-bold py-2 rounded-lg bg-emerald-400 text-slate-950 transition";
                document.getElementById('opt-watching').innerText = "📖 Reading Now"; document.getElementById('opt-plan').innerText = "⏳ Want to Read"; document.getElementById('opt-done').innerText = "✅ Finished Reading";
            }
        }

        // Live API Search Mechanics
        function searchMedia() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('anime-title').value.trim();
            const resultsBox = document.getElementById('search-results');
            if (query.length < 3) { resultsBox.classList.add('hidden'); return; }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://api.jikan.moe/v4/${currentFormType}?q=${encodeURIComponent(query)}&limit=5`);
                    const json = await res.json();
                    renderSearchResults(json.data);
                } catch (e) { console.error("Data tracking node failed:", e); }
            }, 400);
        }

        function renderSearchResults(data) {
            const box = document.getElementById('search-results'); box.innerHTML = '';
            if (!data || data.length === 0) { box.classList.add('hidden'); return; }
            
            data.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-3 p-2 hover:bg-emerald-500/10 cursor-pointer border-b border-slate-900/60 last:border-0 transition text-xs";
                const titleText = item.title;
                const img = item.images?.jpg?.image_url || 'https://img.icons8.com/neon/512/test-tube.png';
                
                row.onclick = function() {
                    document.getElementById('anime-title').value = titleText;
                    tempImgUrl = img;
                    box.classList.add('hidden');
                };
                row.innerHTML = `<img src="${img}" class="w-7 h-9 object-cover rounded shadow border border-slate-800"><div><p class="font-bold text-slate-200">${titleText}</p><p class="text-[10px] text-slate-500">${item.type || ''} (${item.score ? '★ ' + item.score : 'N/A'})</p></div>`;
                box.appendChild(row);
            });
            box.classList.remove('hidden');
        }

        function addAnime() { 
            const t = document.getElementById('anime-title'); const s = document.getElementById('anime-status'); const r = document.getElementById('anime-rating'); const tr = document.getElementById('anime-tier'); const n = document.getElementById('anime-notes');
            if (!t.value.trim()) return; 
            
            let finalImg = tempImgUrl || 'https://img.icons8.com/neon/512/test-tube.png';
            animeList.push({ id: Date.now(), title: t.value.trim(), status: s.value, type: currentFormType, currentEp: 0, rating: r.value ? parseFloat(r.value) : null, tier: tr.value, notes: n.value.trim(), image: finalImg }); 
            
            t.value = ''; r.value = ''; n.value = ''; tempImgUrl = ''; saveToStorage(); renderList(); 
        }
        
        function incrementEp(id, amt) { animeList = animeList.map(item => item.id === id ? { ...item, currentEp: Math.max(0, (item.currentEp || 0) + amt) } : item); saveToStorage(); renderList(); }
        function updateStatus(id, newStatus) { animeList = animeList.map(item => item.id === id ? { ...item, status: newStatus } : item); saveToStorage(); renderList(); }
        function deleteAnime(id) { animeList = animeList.filter(item => item.id !== id); saveToStorage(); renderList(); }
        
        function runScienceRoulette() {
            const planQueue = animeList.filter(item => item.status === 'plan-to-watch'); const alertBox = document.getElementById('toast');
            if (planQueue.length === 0) { showToast("❌ Target queue is empty! Add selections to run algorithm."); return; }
            let counter = 0;
            let interval = setInterval(() => {
                const randomShow = planQueue[Math.floor(Math.random() * planQueue.length)]; showToast(`🔬 Calculating matrix... [${randomShow.title}]`); counter++;
                if (counter > 8) {
                    clearInterval(interval); const finalChoice = planQueue[Math.floor(Math.random() * planQueue.length)];
                    alertBox.innerHTML = `⚡ <strong>Senku's Choice Decision:</strong><br>Go watch/read <strong>${finalChoice.title}</strong> right now! 🚀`; setTimeout(() => alertBox.classList.add('hidden'), 6000);
                }
            }, 150);
        }

        function showToast(text) { const toast = document.getElementById('toast'); toast.innerHTML = text; toast.classList.remove('hidden'); }
        function shareList() { const base64 = btoa(JSON.stringify(animeList)); navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?vault=${base64}`).then(() => { showToast("🚀 Wireless Codex Link Copied! Teleport it to friends."); setTimeout(() => document.getElementById('toast').classList.add('hidden'), 3000); }); }
        
        function renderList() {
            const containers = { 'watching': document.getElementById('list-watching'), 'plan-to-watch': document.getElementById('list-plan-to-watch'), 'completed': document.getElementById('list-completed') }; const counts = { 'watching': 0, 'plan-to-watch': 0, 'completed': 0 }; const tierContainers = { 'S': document.getElementById('tier-S'), 'A': document.getElementById('tier-A'), 'B': document.getElementById('tier-B'), 'C': document.getElementById('tier-C'), 'Trash': document.getElementById('tier-Trash') };
            Object.values(containers).forEach(c => c.innerHTML = ''); Object.values(tierContainers).forEach(tc => tc.innerHTML = '');
            let calculatedMinutes = 0;

            animeList.forEach(anime => {
                counts[anime.status]++; const isAnime = anime.type !== 'manga';
                if (isAnime) calculatedMinutes += (anime.currentEp || 0) * 24;

                const card = document.createElement('div'); card.className = "science-card p-3 rounded-xl flex gap-3 items-start border border-emerald-900/15";
                let typeBadge = `<span class="text-[9px] uppercase px-1.5 py-0.5 rounded ${isAnime?'bg-emerald-500/10 text-emerald-400 border border-emerald-400/20':'bg-blue-500/10 text-blue-400 border border-blue-500/20'}">${anime.type || 'Anime'}</span>`;
                let scorePill = anime.rating ? `<span class="text-[10px] font-mono bg-amber-400/10 text-amber-400 border border-amber-400/20 px-2 py-0.5 rounded">★ ${anime.rating} [${anime.tier}]</span>` : '';
                let noteLayout = anime.notes ? `<div class="text-[11px] text-slate-400 italic bg-slate-950/40 px-2 py-1 rounded-md border border-slate-900/40">🧬 Notes: ${anime.notes}</div>` : '';
                let imgArt = anime.image || 'https://img.icons8.com/neon/512/test-tube.png';
                
                let progressLayout = '';
                if (anime.status === 'watching') {
                    progressLayout = `<div class="flex justify-between items-center bg-slate-950/50 p-2 rounded-lg text-xs font-mono"><span class="text-slate
