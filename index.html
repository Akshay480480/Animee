<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ishigami Science Codex</title>
    
    <!-- Premium Glowing Neon Custom Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="https://img.icons8.com/neon/512/test-tube.png">
    <link rel="apple-touch-icon" sizes="512x512" href="https://img.icons8.com/neon/512/test-tube.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: radial-gradient(ellipse at top, #080f0c, #030605); color: #f1f5f9; min-height: 100vh; font-family: system-ui, sans-serif; }
        .science-card { background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(52, 211, 153, 0.15); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-5xl mx-auto">
        
        <!-- The Ishigami Science Codex Header -->
        <header class="mb-6 pb-4 border-b border-emerald-900/40">
            <div class="flex items-center gap-1.5 mb-1">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] font-mono tracking-widest text-emerald-400 uppercase">Classification Matrix</span>
            </div>
            <h1 id="site-title" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-amber-300">
                The Ishigami Science Codex 🧪
            </h1>
            <div class="flex gap-2 mt-4">
                <button id="share-btn" onclick="shareList()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-3 rounded-xl shadow-lg transition">✨ Share Codex with Friends</button>
                <a id="back-to-mine" href="?" class="hidden w-full bg-slate-800 text-slate-200 text-xs font-bold py-3 rounded-xl text-center items-center justify-center">Back to My Codex</a>
            </div>
        </header>

        <!-- Simple Stats Counters -->
        <section class="grid grid-cols-2 gap-2 mb-6">
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-slate-400">Total Shows</p><p id="stat-total" class="text-lg font-bold mt-0.5 text-slate-100">0</p></div>
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-amber-400">Watching Now</p><p id="stat-watching" class="text-lg font-bold mt-0.5 text-amber-400">0</p></div>
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-emerald-400">Finished</p><p id="stat-completed" class="text-lg font-bold mt-0.5 text-emerald-400">0</p></div>
            <div class="science-card p-3 rounded-xl text-center"><p class="text-[10px] uppercase text-teal-400">Finished %</p><p id="stat-ratio" class="text-lg font-bold mt-0.5 text-teal-400">0%</p></div>
        </section>

        <div id="toast" class="hidden fixed bottom-6 right-6 left-6 bg-slate-900 border border-emerald-500/30 text-emerald-400 p-4 rounded-xl text-xs z-50 text-center">🚀 Link copied! Send it to your friends.</div>

        <!-- Easy Input Panel -->
        <section id="controls-section" class="science-card p-4 rounded-xl mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="anime-title" placeholder="Type Anime Name Here..." class="w-full bg-slate-950 border border-emerald-900/30 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-emerald-500">
                <div class="grid grid-cols-12 gap-2">
                    <select id="anime-status" class="col-span-8 bg-slate-950 border border-emerald-900/30 rounded-xl px-3 py-2.5 text-sm text-slate-300 focus:outline-none">
                        <option value="watching">🍿 Watching Now</option>
                        <option value="plan-to-watch">⏳ Want to Watch</option>
                        <option value="completed">✅ Finished Watching</option>
                    </select>
                    <input type="number" id="anime-rating" min="1" max="10" step="0.5" placeholder="Rating" class="col-span-4 bg-slate-950 border border-emerald-900/30 rounded-xl px-2 py-2.5 text-center text-sm text-white focus:outline-none">
                </div>
                <button onclick="addAnime()" class="w-full bg-emerald-400 hover:bg-emerald-300 text-slate-950 font-black py-2.5 rounded-xl text-sm transition cursor-pointer">Add Anime 🚀</button>
            </div>
        </section>

        <!-- Easy Lists -->
        <main class="space-y-6">
            <div>
                <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-xs uppercase text-amber-400">🍿 Watching Now</h3><span id="badge-watching" class="text-xs text-amber-400 font-bold bg-amber-400/5 px-2 py-0.5 rounded">0</span></div>
                <div id="list-watching" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-xs uppercase text-teal-400">⏳ Want to Watch (Watchlist)</h3><span id="badge-plan-to-watch" class="text-xs text-teal-400 font-bold bg-teal-400/5 px-2 py-0.5 rounded">0</span></div>
                <div id="list-plan-to-watch" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-xs uppercase text-emerald-400">✅ Finished Watching</h3><span id="badge-completed" class="text-xs text-emerald-400 font-bold bg-emerald-400/5 px-2 py-0.5 rounded">0</span></div>
                <div id="list-completed" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <script>
        let animeList = []; let isViewOnlyMode = false;
        function init() { const urlParams = new URLSearchParams(window.location.search); const sharedData = urlParams.get('vault'); if (sharedData) { try { animeList = JSON.parse(atob(sharedData)); isViewOnlyMode = true; setupViewOnlyUI(); } catch (e) { loadFromLocalStorage(); } } else { loadFromLocalStorage(); } renderList(); }
        function loadFromLocalStorage() { const localData = localStorage.getItem('ishigamiAnimeVault'); animeList = localData ? JSON.parse(localData) : []; }
        function setupViewOnlyUI() { const ctrl = document.getElementById('controls-section'); if (ctrl) ctrl.remove(); document.getElementById('share-btn').remove(); document.getElementById('site-title').innerText = "Shared Science Codex"; document.getElementById('back-to-mine').style.display = 'flex'; }
        function saveToStorage() { if (!isViewOnlyMode) localStorage.setItem('ishigamiAnimeVault', JSON.stringify(animeList)); }
        function addAnime() { const t = document.getElementById('anime-title'); const s = document.getElementById('anime-status'); const r = document.getElementById('anime-rating'); if (!t.value.trim()) return; animeList.push({ id: Date.now(), title: t.value.trim(), status: s.value, currentEp: 0, rating: r.value ? parseFloat(r.value) : null }); t.value = ''; r.value = ''; saveToStorage(); renderList(); }
        function incrementEp(id, amt) { animeList = animeList.map(item => item.id === id ? { ...item, currentEp: Math.max(0, (item.currentEp || 0) + amt) } : item); saveToStorage(); renderList(); }
        function updateStatus(id, newStatus) { animeList = animeList.map(item => item.id === id ? { ...item, status: newStatus } : item); saveToStorage(); renderList(); }
        function deleteAnime(id) { animeList = animeList.filter(item => item.id !== id); saveToStorage(); renderList(); }
        function shareList() { const base64 = btoa(JSON.stringify(animeList)); const shareUrl = `${window.location.origin}${window.location.pathname}?vault=${base64}`; navigator.clipboard.writeText(shareUrl).then(() => { const toast = document.getElementById('toast'); toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }); }
        function renderList() {
            const containers = { 'watching': document.getElementById('list-watching'), 'plan-to-watch': document.getElementById('list-plan-to-watch'), 'completed': document.getElementById('list-completed') }; const counts = { 'watching': 0, 'plan-to-watch': 0, 'completed': 0 }; Object.values(containers).forEach(c => c.innerHTML = '');
            animeList.forEach(anime => {
                counts[anime.status]++; const card = document.createElement('div'); card.className = "science-card p-4 rounded-xl flex flex-col justify-between gap-3";
                let scorePill = anime.rating ? `<span class="text-[10px] font-mono bg-emerald-400/10 text-emerald-400 border border-emerald-400/20 px-2 py-0.5 rounded">★ ${anime.rating.toFixed(1)}</span>` : '';
                let progressLayout = '';
                if (anime.status === 'watching') {
                    progressLayout = `<div class="flex justify-between items-center bg-slate-950/50 p-2 rounded-lg text-xs font-mono"><span class="text-slate-500">Episode Tracker</span><div class="flex items-center gap-2">${!isViewOnlyMode?`<button onclick="incrementEp(${anime.id},-1)" class="w-5 h-5 bg-slate-800 hover:bg-slate-700 rounded text-emerald-400 flex items-center justify-center font-bold">-</button>`:''}<span class="text-slate-200">Ep ${anime.currentEp}</span>${!isViewOnlyMode?`<button onclick="incrementEp(${anime.id},1)" class="w-5 h-5 bg-slate-800 hover:bg-slate-700 rounded text-emerald-400 flex items-center justify-center font-bold">+</button>`:''}</div></div>`;
                } else if (anime.status === 'completed') { progressLayout = `<div class="text-xs text-emerald-400 font-mono flex items-center gap-1">✓ Log Completed</div>`; }
                let controls = !isViewOnlyMode ? `<div class="flex justify-between items-center pt-2 border-t border-slate-800/50"><select onchange="updateStatus(${anime.id}, this.value)" class="text-xs bg-slate-950 border border-slate-900 rounded px-2 py-1 text-slate-400"><option value="watching" ${anime.status==='watching'?'selected':''}>Watching</option><option value="plan-to-watch" ${anime.status==='plan-to-watch'?'selected':''}>To Watch</option><option value="completed" ${anime.status==='completed'?'selected':''}>Completed</option></select><button onclick="deleteAnime(${anime.id})" class="text-xs text-slate-600 hover:text-rose-400">Delete</button></div>` : '';
                card.innerHTML = `<div class="flex items-start justify-between gap-2"><div class="font-bold text-sm text-slate-200">${anime.title}</div>${scorePill}</div>${progressLayout}${controls}`; containers[anime.status].appendChild(card);
            });
            const total = animeList.length; document.getElementById('stat-total').innerText = total; document.getElementById('stat-watching').innerText = counts['watching']; document.getElementById('stat-completed').innerText = counts['completed']; document.getElementById('stat-ratio').innerText = total > 0 ? `${Math.round((counts['completed'] / total) * 100)}%` : '0%';
            Object.keys(containers).forEach(k => { document.getElementById(`badge-${k}`).innerText = counts[k]; if(containers[k].children.length === 0) containers[k].innerHTML = `<div class="text-xs text-slate-600 italic p-4 text-center border border-dashed border-emerald-900/20 rounded-xl bg-slate-950/10">Codex empty</div>`; });
        }
        window.onload = init;
    </script>
</body>
    </html>
