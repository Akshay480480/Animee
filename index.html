<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuroDeck Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: #040610; color: #f3f4f6; font-family: sans-serif; }
        .matrix-card { background: rgba(15, 23, 42, 0.45); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); }
        .page-hidden { display: none !important; }
        canvas#particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; }
        .main-app-content { position: relative; z-index: 10; }
    </style>
</head>
<body class="pb-28 pt-20 px-4">
    <canvas id="particleCanvas"></canvas>

    <!-- Navigation -->
    <nav id="topNav" class="fixed top-0 left-0 right-0 max-w-md mx-auto bg-slate-950/90 border-b border-white/10 flex justify-between items-center px-4 py-3.5 z-50 backdrop-blur-md rounded-b-2xl">
        <span id="navLogo" class="text-xs font-black tracking-widest uppercase flex items-center gap-1.5 text-cyan-400">🎬 KURODECK</span>
        <div class="flex gap-4 text-xs font-bold text-slate-400">
            <button onclick="navigate('hub')" class="text-white">Hub</button>
            <button onclick="navigate('discover')">Discover</button>
            <button onclick="navigate('vault')">Vault</button>
            <button onclick="navigate('analytics')">Analytics</button>
        </div>
    </nav>

    <div class="main-app-content max-w-md mx-auto space-y-4">
        <!-- Dashboard Metrics -->
        <section class="grid grid-cols-3 gap-2 bg-slate-950/50 p-2.5 rounded-2xl border border-white/5">
            <div class="text-center"><p class="text-[9px] uppercase text-slate-400 font-bold">Vault</p><p id="count-all" class="text-xl font-black">0</p></div>
            <div class="text-center border-x border-white/5"><p class="text-[9px] uppercase text-cyan-400 font-bold">Active</p><p id="count-active" class="text-xl font-black text-cyan-400">0</p></div>
            <div class="text-center"><p class="text-[9px] uppercase text-emerald-400 font-bold">Done</p><p id="count-done" class="text-xl font-black text-emerald-400">0</p></div>
        </section>

        <!-- Dynamic Content -->
        <div id="view-hub" class="page"><div id="shelf-watching" class="space-y-3"></div></div>
        
        <!-- Offline Backup UI -->
        <section class="matrix-card p-4 rounded-2xl">
            <h3 class="font-black text-xs uppercase mb-2">💾 Data Management</h3>
            <div class="flex gap-2">
                <button onclick="downloadBackup()" class="w-full bg-slate-800 p-2 rounded text-[10px] font-bold">Backup</button>
                <button onclick="document.getElementById('fileInput').click()" class="w-full bg-slate-800 p-2 rounded text-[10px] font-bold">Restore</button>
                <input type="file" id="fileInput" class="hidden" onchange="restoreBackup(event)">
            </div>
        </section>
    </div>

    <script>
        let vaultStorage = JSON.parse(localStorage.getItem('kuroDeck_v9')) || [];

        // Backup System
        function downloadBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vaultStorage));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "kurodeck_backup.json"); dl.click();
        }

        function restoreBackup(e) {
            const reader = new FileReader();
            reader.onload = (event) => { vaultStorage = JSON.parse(event.target.result); localStorage.setItem('kuroDeck_v9', JSON.stringify(vaultStorage)); location.reload(); };
            reader.readAsText(e.target.files[0]);
        }

        // One-tap Progress
        function updateProgress(id, change) {
            const entry = vaultStorage.find(i => i.id === id);
            if(entry) { entry.episode = Math.max(0, (entry.episode || 0) + change); localStorage.setItem('kuroDeck_v9', JSON.stringify(vaultStorage)); renderApp(); }
        }

        function renderApp() {
            const sw = document.getElementById('shelf-watching');
            sw.innerHTML = vaultStorage.filter(i => i.status === 'watching').map((item, idx) => `
                <div class="matrix-card p-3 rounded-xl flex items-center justify-between">
                    <span class="text-xs font-bold">${item.title}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateProgress('${item.id}', -1)" class="bg-slate-800 px-2 rounded">-</button>
                        <span class="text-xs font-mono">Ep ${item.episode || 0}</span>
                        <button onclick="updateProgress('${item.id}', 1)" class="bg-slate-800 px-2 rounded">+</button>
                    </div>
                </div>
            `).join('');
        }
        renderApp();

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('page-hidden'));
            document.getElementById('view-'+id).classList.remove('page-hidden');
        }
    </script>
</body>
</html>
